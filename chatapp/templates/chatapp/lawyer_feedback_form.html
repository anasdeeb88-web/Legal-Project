{% extends "chatapp/base.html" %}
{% load static %}

{% block title %}إرسال ملاحظة{% endblock %}

{% block content %}
<div class="container" style="max-width: 600px;">
    <div class="page-header">
        <h1>إرسال ملاحظة للإدارة</h1>
    </div>

    <form method="post" class="card" style="padding: 2rem;">
        {% csrf_token %}

        <div style="margin: 1rem 0;">
            <label>الموضوع:</label>
            <input type="text" name="subject" placeholder="موضوع الملاحظة" required style="width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 4px;">
        </div>

        <div style="margin: 1rem 0;">
            <label>الرسالة:</label>
            <textarea name="message" placeholder="اكتب ملاحظتك..." required style="width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 4px; min-height: 150px;"></textarea>
        </div>

        <div style="margin: 1rem 0;">
            <label>إضافة صوت (اختياري):</label>
            <input type="file" name="audio_file" accept="audio/*" style="width: 100%;">
        </div>

        <div style="margin-top: 2rem;">
            <button type="submit" class="btn btn-primary">إرسال</button>
            <a href="{% url 'index' %}" class="btn btn-outline">إلغاء</a>
        </div>
    </form>
</div>
{% endblock %}
