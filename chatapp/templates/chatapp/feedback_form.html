{% extends "chatapp/base.html" %}
{% load static %}

{% block title %}إرسال ملاحظة{% endblock %}

{% block content %}
<div class="feedback-page">
    <div class="page-header">
        <h1>إرسال ملاحظة للإدارة</h1>
        <p class="subtitle">نحن نقدر ملاحظاتك ونسعى لتحسين خدماتنا</p>
    </div>

    <div class="feedback-form-card card">
        <form id="feedback-form" method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="form-group">
                <label for="feedback_type">نوع الملاحظة *</label>
                <select name="feedback_type" id="feedback_type" required>
                    {% for code, name in feedback_types %}
                    <option value="{{ code }}">{{ name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="subject">الموضوع *</label>
                <input type="text" id="subject" name="subject" required placeholder="اكتب عنوان الملاحظة">
            </div>

            <div class="form-group">
                <label for="message">الرسالة *</label>
                <textarea id="message" name="message" rows="8" required placeholder="اشرح ملاحظتك بالتفصيل..."></textarea>
            </div>

            <div class="form-group">
                <label>إرفاق تسجيل صوتي (اختياري)</label>
                <div class="audio-section">
                    <button type="button" class="btn btn-outline" onclick="startRecording()" id="record-btn">
                        🎤 بدء التسجيل
                    </button>
                    <span class="or-text">أو</span>
                    <input type="file" name="audio_file" accept="audio/*" id="audio-file-input" style="display:none;">
                    <label for="audio-file-input" class="btn btn-outline">📎 رفع ملف صوتي</label>
                </div>

                <div id="recording-indicator" class="recording-indicator" style="display:none;">
                    <div class="recording-dot"></div>
                    <span>جارٍ التسجيل...</span>
                    <span id="recording-time">0:00</span>
                    <button type="button" class="btn btn-small" style="background:var(--error);color:white;border:none;" onclick="stopRecording()">⏹ إيقاف</button>
                </div>

                <div id="audio-preview" class="audio-preview" style="display:none;">
                    <p>✓ تم رفع الملف الصوتي</p>
                    <audio controls id="audio-player"></audio>
                </div>
                <p class="help-text">الحد الأقصى: 10 MB</p>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary btn-large">📤 إرسال الملاحظة</button>
                <a href="{% url 'index' %}" class="btn btn-outline">إلغاء</a>
            </div>
        </form>
    </div>
</div>

<script src="{% static 'chatapp/audio-recorder.js' %}"></script>
<script>
document.getElementById('feedback-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const formData = new FormData(this);
    const submitBtn = this.querySelector('button[type="submit"]');
    submitBtn.disabled = true;
    submitBtn.innerHTML = '⏳ جارٍ الإرسال...';
    try {
        const response = await fetch('{% url "submit_feedback" %}', {
            method: 'POST', body: formData,
            headers: { 'X-CSRFToken': formData.get('csrfmiddlewaretoken') }
        });
        const data = await response.json();
        if (data.success) {
            alert('✓ ' + data.message);
            window.location.href = '{% url "index" %}';
        } else {
            alert('❌ ' + (data.error || 'حدث خطأ'));
            submitBtn.disabled = false;
            submitBtn.innerHTML = '📤 إرسال الملاحظة';
        }
    } catch (error) {
        alert('❌ حدث خطأ في الاتصال');
        submitBtn.disabled = false;
        submitBtn.innerHTML = '📤 إرسال الملاحظة';
    }
});

document.getElementById('audio-file-input').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (file) {
        const preview = document.getElementById('audio-preview');
        document.getElementById('audio-player').src = URL.createObjectURL(file);
        preview.style.display = 'block';
    }
});
</script>
{% endblock %}
